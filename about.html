<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>About Me</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #0f172a;
            color: white;
        }

        .about {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10%;
        }

        .about-left img {
            width: 550px;
            border-radius: 50px;
            border: 4px solid #38bdf8;
        }

        .about-right {
            max-width: 50%;
        }

        .about-right h2 {
            font-size: 40px;
            margin-bottom: 15px;
        }

        .about-right h2 span {
            color: #38bdf8;
        }

        .about-right p {
            font-size: 18px;
            line-height: 1.7;
            color: #cbd5f5;
            margin-bottom: 20px;
        }

        .info {
            margin-bottom: 25px;
        }

        .info p {
            margin: 8px 0;
            font-size: 16px;
        }

        .info strong {
            color: #38bdf8;
        }

        .about-right button {
            padding: 12px 25px;
            border: none;
            background: #38bdf8;
            color: black;
            font-size: 16px;
            cursor: pointer;
            border-radius: 6px;
            transition: 0.3s;
        }

        .about-right button:hover {
            background: #0ea5e9;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .about {
                flex-direction: column;
                text-align: center;
            }

            .about-right {
                max-width: 100%;
                margin-top: 20px;
            }

            .about-left img {
                width: 250px;
            }
        }
    </style>
</head>
<body>

<section class="about">

    <div class="about-left">
        <img src="https://i.ibb.co.com/spMJT8kK/mehedi-dp.png" alt="About Image">
    </div>

    <div class="about-right">
        <h2>About <span>Me</span></h2>

        <p>
            I am a passionate Web Developer with experience in building
            full-stack web applications. I enjoy solving problems,
            learning new technologies, and creating clean and efficient code.
        </p>

        <div class="info">
            <p><strong>Name:</strong> Your Name</p>
            <p><strong>Email:</strong> your@email.com</p>
            <p><strong>Phone:</strong> +880XXXXXXXXXX</p>
            <p><strong>Address:</strong> Bangladesh</p>
        </div>

        <button>Download CV</button>
    </div>

</section>

</body>
</html>
