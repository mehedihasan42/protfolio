<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #0f172a;
            color: white;
        }

        .contact {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 50px 10%;
        }

        .contact-box {
            width: 100%;
            max-width: 600px;
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
        }

        .contact-box h2 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 35px;
        }

        .contact-box h2 span {
            color: #38bdf8;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 12px;
            border: none;
            outline: none;
            border-radius: 6px;
            background: #0f172a;
            color: white;
        }

        .input-group textarea {
            resize: none;
            height: 120px;
        }

        .contact-box button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #38bdf8;
            color: black;
            font-size: 16px;
            cursor: pointer;
            border-radius: 6px;
            transition: 0.3s;
        }

        .contact-box button:hover {
            background: #0ea5e9;
        }
    </style>
</head>
<body>

<section class="contact">

    <div class="contact-box">
        <h2>Contact <span>Me</span></h2>

        <!-- FormSubmit Integration -->
        <form>

            <div class="input-group">
                <input type="text" name="name" placeholder="Your Name" required>
            </div>

            <div class="input-group">
                <input type="email" name="email" placeholder="Your Email" required>
            </div>

            <div class="input-group">
                <input type="text" name="phone" placeholder="Phone Number" required>
            </div>

            <div class="input-group">
                <input type="text" name="address" placeholder="Address" required>
            </div>

            <div class="input-group">
                <textarea name="message" placeholder="Your Message"></textarea>
            </div>

            <!-- Optional settings -->
            <input type="hidden" name="_captcha" value="false">

            <button type="submit">Send Message</button>

        </form>
    </div>

</section>

</body>
</html>
