<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Portfolio Drawer System</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    display: flex;
    background: #0f172a;
}

/* Sidebar */
.sidebar {
    width: 220px;
    height: 100vh;
    background: #1e293b;
    position: fixed;
    left: 0;
    top: 0;
    padding: 20px;
}

.sidebar h2 {
    text-align: center;
    margin-bottom: 30px;
    color: #38bdf8;
}

.sidebar ul {
    list-style: none;
}

.sidebar ul li {
    margin: 15px 0;
}

.sidebar ul li button {
    width: 100%;
    background: none;
    border: none;
    text-align: left;
    padding: 10px;
    color: #cbd5f5;
    font-size: 16px;
    cursor: pointer;
    border-radius: 6px;
    transition: 0.3s;
}

.sidebar ul li button:hover {
    background: #38bdf8;
    color: black;
}

/* Main Content */
.main {
    margin-left: 220px;
    width: calc(100% - 220px);
    height: 100vh;
}

/* iframe content */
iframe {
    width: 100%;
    height: 100vh;
    border: none;
}
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2><span style="color: aliceblue;">Mehedi</span> Hasan</h2>

    <ul>
        <li><button onclick="loadPage('banner.html')">Home</button></li>
        <li><button onclick="loadPage('about.html')">About</button></li>
        <li><button onclick="loadPage('skill.html')">Skills</button></li>
        <li><button onclick="loadPage('projects.html')">Projects</button></li>
        <li><button onclick="loadPage('contact.html')">Contact</button></li>
    </ul>
</div>

<!-- Main Content -->
<div class="main">
    <iframe id="contentFrame" src="banner.html"></iframe>
</div>

<script>
function loadPage(page) {
    document.getElementById("contentFrame").src = page;
}
</script>

</body>
</html>
