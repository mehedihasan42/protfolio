<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Portfolio Drawer System</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    display: flex;
    background: #0f172a;
}

/* Sidebar */
.sidebar {
    width: 220px;
    height: 100vh;
    background: #1e293b;
    position: fixed;
    left: 0;
    top: 0;
    padding: 20px;
}

.sidebar h2 {
    text-align: center;
    margin-bottom: 30px;
    color: #38bdf8;
}

.sidebar ul {
    list-style: none;
}

.sidebar ul li {
    margin: 15px 0;
}

.sidebar ul li button {
    width: 100%;
    background: none;
    border: none;
    text-align: left;
    padding: 10px;
    color: #cbd5f5;
    font-size: 16px;
    cursor: pointer;
    border-radius: 6px;
    transition: 0.3s;
}

.sidebar ul li button:hover {
    background: #38bdf8;
    color: black;
}

/* Main Content */
.main {
    margin-left: 220px;
    width: calc(100% - 220px);
    height: 100vh;
}

/* iframe content */
iframe {
    width: 100%;
    height: 100vh;
    border: none;
}

html {
    scroll-behavior: smooth;
}

.main section {
    height: 100vh;
    /* padding: 5px; */
    color: white;
}

.sidebar ul li a {
    display: block;
    padding: 10px;
    color: #cbd5f5;
    text-decoration: none;
    border-radius: 6px;
    transition: 0.3s;
}

.sidebar ul li a:hover {
    background: #38bdf8;
    color: black;
}
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2><span style="color: aliceblue;">Mehedi</span> Hasan</h2>

   <ul>
    <li><a href="#home">Home</a></li>
    <li><a href="#about">About</a></li>
    <li><a href="#skills">Skills</a></li>
    <li><a href="#projects">Projects</a></li>
    <li><a href="#contact">Contact</a></li>
</ul>
</div>

<!-- Main Content -->
    <div class="main">
    <section id="home"><iframe src="banner.html"></iframe></section>
    <section id="about"><iframe src="about.html"></iframe></section>
    <section id="skills"><iframe src="skill.html"></iframe></section>
    <section id="projects"><iframe src="projects.html"></iframe></section>
    <section id="contact"><iframe src="contact.html"></iframe></section>
</div>

<script>
function loadPage(page) {
    document.getElementById("contentFrame").src = page;
}
</script>

</body>
</html>
