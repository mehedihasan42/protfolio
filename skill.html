<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Skills Page</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #0f172a;
    color: white;
}

/* Section */
.skills {
    min-height: 100vh;
    padding: 60px 10%;
    text-align: center;
}

.skills h2 {
    font-size: 40px;
    margin-bottom: 40px;
}

.skills h2 span {
    color: #38bdf8;
}

/* GRID SYSTEM */
.skill-container {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 25px;
}

/* CARD DESIGN */
.card {
    background: #1e293b;
    padding: 30px;
    border-radius: 15px;
    transition: 0.3s;
    border: 2px solid transparent;
    cursor: pointer;
}

.card:hover {
    transform: translateY(-10px);
    border: 2px solid #38bdf8;
    box-shadow: 0 10px 25px rgba(56, 189, 248, 0.2);
}

.card img {
    width: 60px;
    margin-bottom: 15px;
}

.card h3 {
    font-size: 18px;
    color: #e2e8f0;
}

/* RESPONSIVE DESIGN */

/* Tablet */
@media (max-width: 992px) {
    .skill-container {
        grid-template-columns: repeat(2, 1fr);
    }
}

/* Mobile */
@media (max-width: 600px) {
    .skill-container {
        grid-template-columns: 1fr;
    }

    .skills h2 {
        font-size: 30px;
    }
}
</style>
</head>

<body>

<section class="skills">

    <h2>My <span>Skills</span></h2>

    <div class="skill-container">

        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/732/732212.png" alt="HTML">
            <h3>HTML</h3>
        </div>

        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/732/732190.png" alt="CSS">
            <h3>CSS</h3>
        </div>

        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/5968/5968292.png" alt="JavaScript">
            <h3>JavaScript</h3>
        </div>

        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/919/919825.png" alt="Node.js">
            <h3>Node.js</h3>
        </div>

        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/919/919851.png" alt="React">
            <h3>React</h3>
        </div>

        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/5968/5968350.png" alt="Python">
            <h3>Python</h3>
        </div>

        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/919/919836.png" alt="MongoDB">
            <h3>MongoDB</h3>
        </div>

        <div class="card">
            <img src="https://cdn.worldvectorlogo.com/logos/django.svg" alt="Django">
            <h3>Django</h3>
        </div>

    </div>

</section>

</body>
</html>
